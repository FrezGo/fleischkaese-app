<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleischkäse - Bestellsystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Background decorative elements -->
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Main container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div>
                    <h1>🍖 Fleischkäse</h1>
                    <p class="subtitle">Deine Wünsche, unsere Mission - jetzt bestellen!</p>
                </div>
                <div class="theme-toggle-header">
                    <label for="check-5" class="theme-label">🌙 Dark</label>
                    <input id="check-5" type="checkbox" class="theme-switch">
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <div class="grid-container">
                <!-- Left column: Configurations & Leaderboard -->
                <div class="left-column">
                    <!-- Leaderboard Section -->
                    <section class="card leaderboard-section">
                        <h2>🏆 Fleischkäse-Leaderboard</h2>
                        <div id="leaderboard-content">
                            <p id="no-leaderboard-data" class="text-muted">Noch keine Bestellungen erfasst.</p>
                            <ul id="leaderboard-list" class="leaderboard-list">
                                <!-- Entries inserted by JS -->
                            </ul>
                        </div>
                    </section>

                    <!-- Menu Section -->
                    <section class="card menu-section">
                        <h2>🍖 Konfigurationen</h2>
                        
                        <!-- Configurations Container -->
                        <div id="fleischkaese-configurations" class="configs-container">
                            <!-- Cards will be generated here -->
                        </div>

                        <!-- Add Configuration Button -->
                        <button type="button" id="add-config-btn" class="btn btn-primary btn-full">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            Weitere Konfiguration hinzufügen
                        </button>
                    </section>
                </div>

                <!-- Right column: Summary and Form -->
                <div class="right-column">
                    <!-- Order Summary -->
                    <section class="card summary-section sticky-top">
                        <h2>🛒 Zusammenfassung</h2>
                        
                        <ul id="selected-items" class="items-list">
                            <li class="text-muted">Noch keine Artikel ausgewählt.</li>
                        </ul>

                        <div class="price-box">
                            <div class="price-row">
                                <span>Artikel:</span>
                                <span id="item-count" class="price-value">0,00€</span>
                            </div>
                            <div class="price-row">
                                <span>Trinkgeld:</span>
                                <span id="tip-display" class="price-value">0,00€</span>
                            </div>
                            <div class="price-row total">
                                <span>Gesamt:</span>
                                <span id="total-price" class="price-value">0,00€</span>
                            </div>
                        </div>

                        <!-- Customer Info Form -->
                        <form id="order-form" class="form">
                            <div class="form-group">
                                <label for="customer-name">Ihr Name</label>
                                <input type="text" id="customer-name" required placeholder="Ihr Name...">
                            </div>

                            <div class="form-group">
                                <label for="tip">Trinkgeld (€)</label>
                                <input type="number" id="tip" min="0" step="0.10" value="0">
                            </div>

                            <button type="submit" class="btn btn-success btn-full">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                </svg>
                                Bestellung abschicken
                            </button>
                        </form>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
