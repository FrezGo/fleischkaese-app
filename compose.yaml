version: '3.8'

services:
  fleischkaese-app:
    build: .
    container_name: fleischkaese-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # ACHTUNG: Der korrekte Pfad im 'stacks'-Dataset
      - /mnt/Pool-1-Homestorrage/stacks/fleischkaese-app/orders.json:/app/orders.json
      - /mnt/Pool-1-Homestorrage/stacks/fleischkaese-app/acceptance_days.json:/app/acceptance_days.json # Die zweite Datei

  cloudflared-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      - fleischkaese-app
    # Sicher: Lädt den Token aus der cloudflared.env-Datei (ersetzt 'environment:')
    env_file:
      - ./cloudflared.env
    command: tunnel --no-autoupdate run