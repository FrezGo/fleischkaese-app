version: '3.8'

services:
  fleischkaese-app:
    build: .
    container_name: fleischkaese-app
    restart: unless-stopped
    ports:
      # Nur benötigt, wenn Sie die App direkt von TrueNAS aus testen wollen,
      # aber unschädlich, da der Cloudflared Tunnel interne Kommunikation nutzt.
      - "5000:5000"
    volumes:
      # WICHTIG: Ersetzen Sie /mnt/Poolname/Pfad/ durch Ihren echten Pfad auf TrueNAS
      - /mnt/Pool-1-Homestorrage/App-Daten/fleischkaese-app/orders.json:/app/orders.json
      # Die zweite Persistenzdatei hinzufügen:
      - /mnt/Pool-1-Homestorrage/App-Daten/fleischkaese-app/acceptance_days.json:/app/acceptance_days.json
    # Network-Mode auf "bridge" lassen (Standard)

  cloudflared-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      - fleischkaese-app
    # Sicherer: Laden Sie den Token aus der cloudflared.env-Datei
    env_file:
      - ./cloudflared.env
    command: tunnel --no-autoupdate run